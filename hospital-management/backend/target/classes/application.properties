# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Application Name
spring.application.name=Hospital Management System

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Nagendra@123

# MySQL (Production) - Uncomment and configure:
# spring.datasource.url=jdbc:mysql://localhost:3306/hospitaldb?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=yourpassword

# JPA / Hibernate

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# For MySQL: spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=HospitalManagementSystemSecretKey2024SuperSecureBase64EncodedKey
jwt.expiration=86400000

# CORS
cors.allowed-origins=http://localhost:3000,http://localhost:8081,http://127.0.0.1:5500

# Logging
logging.level.com.hospital=INFO
logging.level.org.springframework.security=WARN

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
