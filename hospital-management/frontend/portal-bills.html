<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bills — MediCare Pro</title>
<link rel="stylesheet" href="css/portal.css">
</head>
<body>

<nav class="portal-nav">
    <a href="portal-dashboard.html" class="nav-logo">
        <div class="nav-logo-icon">🏥</div>
        <div><div class="nav-logo-text">MediCare Pro</div><div class="nav-logo-sub">Patient Portal</div></div>
    </a>
    <div class="nav-links">
        <a href="portal-dashboard.html" class="nav-link">🏠 Dashboard</a>
        <a href="portal-appointments.html" class="nav-link">📅 Appointments</a>
        <a href="portal-doctors.html" class="nav-link">👨‍⚕️ Doctors</a>
        <a href="portal-bills.html" class="nav-link active">🧾 My Bills</a>
        <a href="portal-profile.html" class="nav-link">👤 Profile</a>
    </div>
    <div class="nav-right">
        <div class="nav-user" onclick="location.href='portal-profile.html'">
            <div class="nav-avatar" id="nav-avatar">P</div>
            <div class="nav-user-name" id="nav-user-name">Patient</div>
        </div>
        <button class="btn btn-outline btn-sm" onclick="portalLogout()">Logout</button>
    </div>
</nav>

<div class="page-container">
    <div class="page-header">
        <div class="page-title">🧾 My Bills</div>
        <div class="page-subtitle">View your billing history and payment status</div>
    </div>

    <!-- Summary -->
    <div class="stats-row" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px">
        <div class="stat-card">
            <div class="stat-icon-wrap" style="background:var(--green-pale)">💰</div>
            <div class="stat-info">
                <div class="label">Total Paid</div>
                <div class="value" style="color:var(--green);font-size:20px" id="total-paid">—</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap" style="background:var(--amber-pale)">⏳</div>
            <div class="stat-info">
                <div class="label">Total Due</div>
                <div class="value" style="color:var(--amber);font-size:20px" id="total-due">—</div>
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-icon-wrap" style="background:var(--primary-pale)">🧾</div>
            <div class="stat-info">
                <div class="label">Total Bills</div>
                <div class="value" style="color:var(--primary)" id="total-bills">—</div>
            </div>
        </div>
    </div>

    <div class="card">
        <div id="bills-container">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
</div>

<!-- Bill Detail Modal -->
<div id="bill-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)document.getElementById('bill-modal').style.display='none'">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title">🧾 Bill Details</div>
            <button class="modal-close" onclick="document.getElementById('bill-modal').style.display='none'">✕</button>
        </div>
        <div class="modal-body" id="bill-detail-body"></div>
    </div>
</div>

<script src="js/portal-api.js"></script>
<script>
const user = requirePatientAuth();
loadNavUser();

let allBills = [];

async function loadBills() {
    const res = await portalApi.getMyBills(user.id);
    if (!res?.ok) return;
    allBills = res.data;

    // Summary
    const totalPaid = allBills.reduce((s, b) => s + (b.paidAmount || 0), 0);
    const totalDue = allBills.reduce((s, b) => s + (b.dueAmount || 0), 0);
    document.getElementById('total-paid').textContent = formatCurrency(totalPaid);
    document.getElementById('total-due').textContent = formatCurrency(totalDue);
    document.getElementById('total-bills').textContent = allBills.length;

    renderBills(allBills);
}

function renderBills(bills) {
    const el = document.getElementById('bills-container');
    if (!bills.length) {
        el.innerHTML = '<div class="table-empty">No bills found</div>';
        return;
    }

    el.innerHTML = bills.map(b => `
        <div style="display:flex;align-items:center;gap:16px;padding:18px 24px;border-bottom:1px solid #f3f0ec;cursor:pointer;transition:background 0.15s" onclick="viewBill(${b.id})" onmouseover="this.style.background='#f8faff'" onmouseout="this.style.background=''">
            <div style="width:46px;height:46px;border-radius:12px;background:${b.status==='PAID'?'var(--green-pale)':b.status==='PENDING'?'var(--amber-pale)':'var(--rose-pale)'};display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">
                ${b.status==='PAID'?'✅':b.status==='PENDING'?'⏳':'🧾'}
            </div>
            <div style="flex:1">
                <div style="font-weight:800;font-size:14px">${b.billNumber || 'Bill #'+b.id}</div>
                <div style="font-size:12px;color:var(--muted)">Created: ${formatDate(b.createdAt)}</div>
            </div>
            <div style="text-align:right">
                <div style="font-weight:800;font-size:16px;color:var(--text)">₹${b.totalAmount || 0}</div>
                ${b.dueAmount > 0 ? `<div style="font-size:11px;color:var(--rose);font-weight:700">Due: ₹${b.dueAmount}</div>` : ''}
            </div>
            <div style="margin-left:12px">${statusBadge(b.status)}</div>
        </div>
    `).join('');
}

function viewBill(id) {
    const b = allBills.find(x => x.id === id);
    if (!b) return;

    document.getElementById('bill-detail-body').innerHTML = `
        <div style="background:var(--bg);border-radius:12px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
            <div>
                <div style="font-size:11px;color:var(--muted);font-weight:700">BILL NUMBER</div>
                <div style="font-size:18px;font-weight:800;font-family:monospace">${b.billNumber || '#'+b.id}</div>
            </div>
            ${statusBadge(b.status)}
        </div>

        <div style="border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px">
            <div style="padding:12px 16px;background:#f8faff;font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase">Charges Breakdown</div>
            ${row('Consultation Fee', b.consultationFee)}
            ${row('Medication', b.medicationCharges)}
            ${row('Laboratory', b.labCharges)}
            ${row('Room Charges', b.roomCharges)}
            ${row('Surgery', b.surgeryCharges)}
            ${row('Other', b.otherCharges)}
            ${b.discount ? `<div style="display:flex;justify-content:space-between;padding:10px 16px;background:var(--green-pale);color:var(--green);font-weight:700"><span>Discount</span><span>- ₹${b.discount}</span></div>` : ''}
            <div style="display:flex;justify-content:space-between;padding:10px 16px;background:var(--bg)"><span style="color:var(--muted)">GST (5%)</span><span>₹${b.taxAmount || 0}</span></div>
            <div style="display:flex;justify-content:space-between;padding:14px 16px;background:var(--primary);color:#fff;font-weight:800;font-size:16px">
                <span>Total Amount</span><span>₹${b.totalAmount || 0}</span>
            </div>
        </div>

        <div class="form-grid">
            <div style="background:var(--green-pale);border-radius:10px;padding:14px;text-align:center">
                <div style="font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase">Amount Paid</div>
                <div style="font-size:20px;font-weight:800;color:var(--green)">₹${b.paidAmount || 0}</div>
            </div>
            <div style="background:${b.dueAmount > 0 ? 'var(--rose-pale)' : 'var(--green-pale)'};border-radius:10px;padding:14px;text-align:center">
                <div style="font-size:11px;color:${b.dueAmount > 0 ? 'var(--rose)' : 'var(--green)'};font-weight:700;text-transform:uppercase">Amount Due</div>
                <div style="font-size:20px;font-weight:800;color:${b.dueAmount > 0 ? 'var(--rose)' : 'var(--green)'}">₹${b.dueAmount || 0}</div>
            </div>
        </div>

        ${b.paymentMethod ? `<div style="margin-top:12px;font-size:12px;color:var(--muted);text-align:center">Payment via: <strong>${b.paymentMethod}</strong></div>` : ''}
        ${b.dueAmount > 0 ? `<div style="margin-top:16px;background:var(--amber-pale);border-radius:10px;padding:14px;text-align:center;font-size:13px;font-weight:700;color:var(--amber)">⚠️ Please contact the hospital reception to clear your due amount</div>` : ''}
    `;

    document.getElementById('bill-modal').style.display = 'flex';
}

function row(label, val) {
    if (!val || val === 0) return '';
    return `<div style="display:flex;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border)"><span style="color:var(--muted)">${label}</span><span style="font-weight:600">₹${val}</span></div>`;
}

loadBills();
</script>
</body>
</html>
