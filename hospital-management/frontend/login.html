<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — MediCare Pro</title>
<link rel="stylesheet" href="css/style.css">
<style>
.login-page { background: linear-gradient(135deg, #0d1b2a 0%, #0f3a50 50%, #0d1b2a 100%); }
.bg-pattern {
    position: fixed; inset: 0; z-index: 0; overflow: hidden;
}
.bg-circle {
    position: absolute; border-radius: 50%;
    background: rgba(15,124,124,0.08);
}
.login-card { position: relative; z-index: 1; }
.demo-creds {
    background: var(--teal-pale); border: 1px solid var(--teal);
    border-radius: 10px; padding: 14px; margin-bottom: 24px; font-size: 12px;
}
.demo-creds strong { color: var(--teal); }
.demo-row { display: flex; justify-content: space-between; margin-top: 4px; color: var(--text); }
.error-msg { background: var(--rose-pale); border: 1px solid var(--rose); color: var(--rose); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 16px; display: none; }
</style>
</head>
<body>
<div class="login-page">
    <div class="bg-pattern">
        <div class="bg-circle" style="width:600px;height:600px;top:-200px;right:-200px;"></div>
        <div class="bg-circle" style="width:400px;height:400px;bottom:-100px;left:-150px;"></div>
    </div>

    <div class="login-card">
        <div class="login-logo">
            <div class="logo-icon" style="width:56px;height:56px;border-radius:16px;font-size:28px;">🏥</div>
            <h1 class="login-title" style="margin-top:16px">MediCare Pro</h1>
            <p class="login-sub">Hospital Management System</p>
        </div>

        <div class="demo-creds">
            <strong>Demo Credentials</strong>
            <div class="demo-row"><span>Admin:</span> <span class="mono">admin / admin123</span></div>
            <div class="demo-row"><span>Doctor:</span> <span class="mono">drpatel / doctor123</span></div>
            <div class="demo-row"><span>Staff:</span> <span class="mono">reception / staff123</span></div>
        </div>

        <div id="error-msg" class="error-msg"></div>

        <div class="form-group" style="margin-bottom:16px">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" value="admin">
        </div>

        <div class="form-group" style="margin-bottom:24px">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password" value="admin123">
        </div>

        <button class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;" onclick="handleLogin()" id="login-btn">
            Sign In →
        </button>

        <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--muted);">
            Secure access · MediCare Pro v1.0
        </p>
    </div>
</div>

<script>
async function handleLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errEl = document.getElementById('error-msg');

    if (!username || !password) {
        errEl.textContent = 'Please enter username and password';
        errEl.style.display = 'block';
        return;
    }

    btn.textContent = 'Signing in...';
    btn.disabled = true;
    errEl.style.display = 'none';

    try {
        const res = await fetch('http://localhost:8080/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (res.ok) {
            localStorage.setItem('hms_token', data.token);
            localStorage.setItem('hms_user', JSON.stringify(data.user));
            window.location.href = 'index.html';
        } else {
            errEl.textContent = data.message || 'Login failed';
            errEl.style.display = 'block';
            btn.textContent = 'Sign In →';
            btn.disabled = false;
        }
    } catch (e) {
        errEl.textContent = 'Cannot connect to server. Make sure the backend is running on port 8080.';
        errEl.style.display = 'block';
        btn.textContent = 'Sign In →';
        btn.disabled = false;
    }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

// Redirect if already logged in
if (localStorage.getItem('hms_token')) window.location.href = 'index.html';
</script>
</body>
</html>
