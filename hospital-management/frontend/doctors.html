<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctors — MediCare Pro</title>
<link rel="stylesheet" href="css/style.css">
<style>
.doctor-card {
    background: var(--surface); border-radius: 16px; border: 1px solid var(--border);
    padding: 24px; transition: transform 0.2s, box-shadow 0.2s;
}
.doctor-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
.doctor-avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--teal-light));
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 16px;
}
.doctor-name { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.doctor-spec { font-size: 12px; color: var(--teal); font-weight: 600; margin-bottom: 12px; }
.doctor-stat { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.doctor-actions { display: flex; gap: 8px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
.doctors-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
</style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="logo-mark">
            <div class="logo-icon">🏥</div>
            <div><div class="logo-text">MediCare Pro</div><div class="logo-sub">Hospital Management</div></div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section">Main</div>
        <a class="nav-item" href="index.html"><span class="icon">📊</span> Dashboard</a>
        <a class="nav-item" href="patients.html"><span class="icon">🧑‍⚕️</span> Patients</a>
        <a class="nav-item" href="appointments.html"><span class="icon">📅</span> Appointments</a>
        <a class="nav-item active" href="doctors.html"><span class="icon">👨‍⚕️</span> Doctors</a>
        <div class="nav-section">Operations</div>
        <a class="nav-item" href="billing.html"><span class="icon">🧾</span> Billing</a>
        <div class="nav-section">Account</div>
        <a class="nav-item" href="#" onclick="logout()"><span class="icon">🚪</span> Logout</a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-card">
            <div class="user-avatar" id="user-avatar">AD</div>
            <div class="user-info">
                <div class="user-name" id="user-name">Loading...</div>
                <div class="user-role" id="user-role">—</div>
            </div>
        </div>
    </div>
</aside>

<main class="main">
    <header class="topbar">
        <div class="page-title">Doctors</div>
        <div style="flex:1"></div>
        <button class="btn btn-primary" onclick="openAddModal()">＋ Add Doctor</button>
    </header>
    <div class="content">
        <div class="toolbar">
            <div class="search-bar" style="flex:1;max-width:340px">
                <span>🔍</span>
                <input type="text" placeholder="Search doctors..." oninput="debounceSearch(this.value)">
            </div>
            <div class="filter-pills">
                <div class="pill active" onclick="filterStatus('ALL',this)">All</div>
                <div class="pill" onclick="filterStatus('ACTIVE',this)">Active</div>
                <div class="pill" onclick="filterStatus('ON_LEAVE',this)">On Leave</div>
                <div class="pill" onclick="filterStatus('INACTIVE',this)">Inactive</div>
            </div>
        </div>
        <div class="doctors-grid" id="doctors-grid">
            <div class="loading"><div class="spinner"></div></div>
        </div>
    </div>
</main>

<!-- Doctor Modal -->
<div id="doctor-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">Add Doctor</div>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="doctor-id">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">First Name <span class="required">*</span></label>
                    <input type="text" id="f-firstName" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name <span class="required">*</span></label>
                    <input type="text" id="f-lastName" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Email <span class="required">*</span></label>
                    <input type="email" id="f-email" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="text" id="f-phone" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Specialization <span class="required">*</span></label>
                    <input type="text" id="f-spec" class="form-control" placeholder="e.g. Cardiology">
                </div>
                <div class="form-group">
                    <label class="form-label">Department</label>
                    <input type="text" id="f-dept" class="form-control">
                </div>
                <div class="form-group">
                    <label class="form-label">Qualification</label>
                    <input type="text" id="f-qual" class="form-control" placeholder="e.g. MBBS, MD">
                </div>
                <div class="form-group">
                    <label class="form-label">Experience (Years)</label>
                    <input type="number" id="f-exp" class="form-control" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Consultation Fee (₹)</label>
                    <input type="number" id="f-fee" class="form-control" min="0">
                </div>
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select id="f-status" class="form-control">
                        <option value="ACTIVE">Active</option>
                        <option value="INACTIVE">Inactive</option>
                        <option value="ON_LEAVE">On Leave</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Consultation Days</label>
                    <input type="text" id="f-days" class="form-control" placeholder="MON,TUE,WED,THU,FRI">
                </div>
                <div class="form-group">
                    <label class="form-label">Consultation Hours</label>
                    <input type="text" id="f-hours" class="form-control" placeholder="09:00-17:00">
                </div>
                <div class="form-group form-full">
                    <label class="form-label">Bio</label>
                    <textarea id="f-bio" class="form-control" placeholder="Doctor's bio..."></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveDoctor()">Save Doctor</button>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
requireAuth(); loadUserInfo();
let allDoctors = [];

async function loadDoctors() {
    const res = await api.getDoctors();
    if (!res?.ok) return;
    allDoctors = res.data;
    renderCards(allDoctors);
}

function renderCards(doctors) {
    const grid = document.getElementById('doctors-grid');
    if (!doctors.length) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--muted)">No doctors found</div>';
        return;
    }
    grid.innerHTML = doctors.map(d => `
        <div class="doctor-card">
            <div class="doctor-avatar">${((d.firstName||'?')[0]+(d.lastName||'?')[0]).toUpperCase()}</div>
            <div class="doctor-name">Dr. ${d.firstName} ${d.lastName}</div>
            <div class="doctor-spec">${d.specialization}</div>
            ${statusBadge(d.status)}
            <div style="margin-top:12px">
                <div class="doctor-stat">🎓 ${d.qualification || '—'}</div>
                <div class="doctor-stat">⏱️ ${d.experienceYears || 0} years experience</div>
                <div class="doctor-stat">💰 ${d.consultationFee ? '₹'+d.consultationFee : '—'} / visit</div>
                <div class="doctor-stat">📅 ${d.consultationDays || '—'}</div>
                <div class="doctor-stat">🕐 ${d.consultationHours || '—'}</div>
                <div class="doctor-stat">🏥 ${d.department || '—'}</div>
            </div>
            <div class="doctor-actions">
                <button class="btn btn-outline btn-sm" onclick="editDoctor(${d.id})" style="flex:1">Edit</button>
                <button class="btn btn-danger btn-sm" onclick="deleteDoctor(${d.id})">🗑️</button>
            </div>
        </div>
    `).join('');
}

function filterStatus(status, el) {
    document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    renderCards(status === 'ALL' ? allDoctors : allDoctors.filter(d => d.status === status));
}

let st;
function debounceSearch(q) {
    clearTimeout(st);
    st = setTimeout(async () => {
        if (q.length < 2) { renderCards(allDoctors); return; }
        const res = await api.searchDoctors(q);
        if (res?.ok) renderCards(res.data);
    }, 400);
}

function openAddModal() {
    document.getElementById('modal-title').textContent = 'Add Doctor';
    document.getElementById('doctor-id').value = '';
    ['firstName','lastName','email','phone','spec','dept','qual','exp','fee','status','days','hours','bio']
        .forEach(f => { const el = document.getElementById('f-'+f); if(el) el.value = ''; });
    document.getElementById('f-status').value = 'ACTIVE';
    document.getElementById('doctor-modal').style.display = 'flex';
}

function editDoctor(id) {
    const d = allDoctors.find(x => x.id === id);
    if (!d) return;
    document.getElementById('modal-title').textContent = 'Edit Doctor';
    document.getElementById('doctor-id').value = id;
    document.getElementById('f-firstName').value = d.firstName || '';
    document.getElementById('f-lastName').value = d.lastName || '';
    document.getElementById('f-email').value = d.email || '';
    document.getElementById('f-phone').value = d.phone || '';
    document.getElementById('f-spec').value = d.specialization || '';
    document.getElementById('f-dept').value = d.department || '';
    document.getElementById('f-qual').value = d.qualification || '';
    document.getElementById('f-exp').value = d.experienceYears || '';
    document.getElementById('f-fee').value = d.consultationFee || '';
    document.getElementById('f-status').value = d.status || 'ACTIVE';
    document.getElementById('f-days').value = d.consultationDays || '';
    document.getElementById('f-hours').value = d.consultationHours || '';
    document.getElementById('f-bio').value = d.bio || '';
    document.getElementById('doctor-modal').style.display = 'flex';
}

async function saveDoctor() {
    const id = document.getElementById('doctor-id').value;
    const data = {
        firstName: document.getElementById('f-firstName').value.trim(),
        lastName: document.getElementById('f-lastName').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        specialization: document.getElementById('f-spec').value.trim(),
        department: document.getElementById('f-dept').value.trim(),
        qualification: document.getElementById('f-qual').value.trim(),
        experienceYears: parseInt(document.getElementById('f-exp').value) || 0,
        consultationFee: parseFloat(document.getElementById('f-fee').value) || 0,
        status: document.getElementById('f-status').value,
        consultationDays: document.getElementById('f-days').value,
        consultationHours: document.getElementById('f-hours').value,
        bio: document.getElementById('f-bio').value,
    };
    if (!data.firstName || !data.email || !data.specialization) {
        showToast('Fill required fields', 'warning'); return;
    }
    const res = id ? await api.updateDoctor(id, data) : await api.createDoctor(data);
    if (res?.ok) { showToast(id ? 'Doctor updated!' : 'Doctor added!'); closeModal(); loadDoctors(); }
    else showToast(res?.data?.message || 'Error saving doctor', 'error');
}

async function deleteDoctor(id) {
    if (!confirm('Delete this doctor?')) return;
    const res = await api.deleteDoctor(id);
    if (res?.ok) { showToast('Doctor deleted'); loadDoctors(); }
    else showToast('Error deleting doctor', 'error');
}

function closeModal() { document.getElementById('doctor-modal').style.display = 'none'; }
function logout() {
    localStorage.removeItem('hms_token');
    localStorage.removeItem('hms_user');
    window.location.href = 'index.html';
}
loadDoctors();
</script>
</body>
</html>
